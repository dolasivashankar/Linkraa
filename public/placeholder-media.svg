<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121214" />
      <stop offset="50%" stop-color="#1E1E22" />
      <stop offset="100%" stop-color="#09090B" />
    </linearGradient>
    
    <!-- Indigo/Violet Accent Glow -->
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0" />
    </radialGradient>
    
    <!-- Icon/Brand Gradient -->
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#a5b4fc" />
    </linearGradient>
  </defs>

  <!-- Background Rect -->
  <rect width="800" height="450" fill="url(#bg-grad)" />
  
  <!-- Glow Overlay -->
  <rect width="800" height="450" fill="url(#glow-grad)" />

  <!-- Grid Decoration -->
  <g opacity="0.08">
    <circle cx="100" cy="100" r="1" fill="#FFFFFF" />
    <circle cx="200" cy="100" r="1" fill="#FFFFFF" />
    <circle cx="300" cy="100" r="1" fill="#FFFFFF" />
    <circle cx="400" cy="100" r="1" fill="#FFFFFF" />
    <circle cx="500" cy="100" r="1" fill="#FFFFFF" />
    <circle cx="600" cy="100" r="1" fill="#FFFFFF" />
    <circle cx="700" cy="100" r="1" fill="#FFFFFF" />
    
    <circle cx="100" cy="200" r="1" fill="#FFFFFF" />
    <circle cx="200" cy="200" r="1" fill="#FFFFFF" />
    <circle cx="300" cy="200" r="1" fill="#FFFFFF" />
    <circle cx="400" cy="200" r="1" fill="#FFFFFF" />
    <circle cx="500" cy="200" r="1" fill="#FFFFFF" />
    <circle cx="600" cy="200" r="1" fill="#FFFFFF" />
    <circle cx="700" cy="200" r="1" fill="#FFFFFF" />
    
    <circle cx="100" cy="300" r="1" fill="#FFFFFF" />
    <circle cx="200" cy="300" r="1" fill="#FFFFFF" />
    <circle cx="300" cy="300" r="1" fill="#FFFFFF" />
    <circle cx="400" cy="300" r="1" fill="#FFFFFF" />
    <circle cx="500" cy="300" r="1" fill="#FFFFFF" />
    <circle cx="600" cy="300" r="1" fill="#FFFFFF" />
    <circle cx="700" cy="300" r="1" fill="#FFFFFF" />
  </g>

  <!-- Central Media Icon and Brand Title -->
  <g transform="translate(400, 225)" text-anchor="middle">
    <!-- Circle Icon Backdrop -->
    <circle r="45" fill="#18181B" stroke="#6366F1" stroke-width="2" stroke-opacity="0.3" />
    
    <!-- Film/Play Icon (SVG path) -->
    <path d="M-12,-16 L18,0 L-12,16 Z" fill="url(#icon-grad)" transform="scale(0.85)" style="stroke-linejoin: round; stroke-width: 3; stroke: url(#icon-grad);" />
    
    <!-- Brand Tagline -->
    <text y="80" fill="#F4F4F5" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="28" letter-spacing="1">Linkraa</text>
    <text y="110" fill="#A1A1AA" font-family="'Inter', sans-serif" font-weight="600" font-size="12" letter-spacing="4" opacity="0.6">PASTE • PREVIEW • SAVE</text>
  </g>
</svg>
